<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register · TestNova</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="register-page hide-floating-register">
  <header class="topbar">
    <div class="container nav-container">
      <a class="brand" href="index.html">QA Training Hub</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="selenium.html">Selenium</a>
        <a href="hybrid.html">Hybrid</a>
        <a href="playwright.html">Playwright</a>
        <a href="api.html">API</a>
        <a href="rest.html">REST Assured</a>
        <a href="cucumber.html">Cucumber</a>
        <a href="jenkins.html">Jenkins</a>
        <a href="master.html">Master Doc</a>
        <a class="nav-register active" href="register.html">Register</a>
      </nav>
    </div>
  </header>

  <main class="container page-header">
    <h1>Register for the Course</h1>
    <p>Fill in the form below. Our team will reach out to you on the contact details you provide.</p>
  </main>

  <main class="container" style="padding-bottom: 3rem;">
    <div class="register-card">
      <form id="register-form" novalidate>
        <div class="form-row">
          <div class="form-field">
            <label for="reg-name">Name *</label>
            <input id="reg-name" name="name" type="text" required data-testid="reg-name" />
          </div>
          <div class="form-field">
            <label for="reg-mobile">Mobile *</label>
            <input id="reg-mobile" name="mobile" type="tel" required pattern="[0-9+\- ]{7,}" data-testid="reg-mobile" />
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="reg-email">Email *</label>
            <input id="reg-email" name="email" type="email" required data-testid="reg-email" />
          </div>
          <div class="form-field">
            <label for="reg-course">Course *</label>
            <select id="reg-course" name="course" required data-testid="reg-course">
              <option value="">— Select course —</option>
              <option>Selenium Java</option>
              <option>Selenium Java Hybrid Framework</option>
              <option>Playwright with TypeScript</option>
              <option>REST Assured / API Testing</option>
              <option>Cucumber BDD</option>
              <option>Jenkins / CI-CD</option>
              <option>Full QA Bootcamp</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field">
            <label for="reg-experience">Experience</label>
            <select id="reg-experience" name="experience" data-testid="reg-experience">
              <option value="">— Select —</option>
              <option>Fresher</option>
              <option>0-1 years</option>
              <option>1-3 years</option>
              <option>3-5 years</option>
              <option>5+ years</option>
            </select>
          </div>
          <div class="form-field">
            <label for="reg-source">Where did you hear about us?</label>
            <select id="reg-source" name="source" data-testid="reg-source">
              <option value="">— Select —</option>
              <option>Instagram</option>
              <option>Website</option>
              <option>LinkedIn</option>
              <option>YouTube</option>
              <option>Friend / Referral</option>
              <option>Other</option>
            </select>
          </div>
        </div>

        <div class="form-row">
          <div class="form-field full">
            <label for="reg-remarks">Remarks (anything we should know)</label>
            <textarea id="reg-remarks" name="remarks" rows="3" data-testid="reg-remarks"></textarea>
          </div>
        </div>

        <button type="submit" class="form-submit" id="reg-submit" data-testid="reg-submit">
          Submit Registration
        </button>

        <div class="form-message" id="reg-message" role="status" aria-live="polite" data-testid="reg-message"></div>
      </form>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>QA Training Hub · Registration.</p>
    </div>
  </footer>

  <script src="site.js"></script>
  <script>
    /*
     * ─── REGISTRATION EMAIL DELIVERY ───────────────────────────────────────
     * This site is hosted on GitHub Pages (static), so we use Web3Forms
     * (https://web3forms.com) to forward each submission to admin@testnova.in.
     *
     * SETUP (one-time, ~2 minutes):
     *   1. Visit  https://web3forms.com
     *   2. Click "Create Access Key"
     *   3. Enter  admin@testnova.in  → check that inbox → click verify link
     *   4. Copy the access key shown on the page (looks like a UUID).
     *   5. Replace the WEB3FORMS_ACCESS_KEY value below with that key.
     *   6. Commit + push. Every registration now arrives in admin@testnova.in.
     *
     * Free tier: unlimited submissions, ~250/month soft cap.
     * No backend, no SMTP credentials in code, no GitHub Action needed.
     * ──────────────────────────────────────────────────────────────────────
     */
    var WEB3FORMS_ACCESS_KEY = "2c4d5272-a627-4b76-bacc-5032eacf20c6";

    (function () {
      var form = document.getElementById('register-form');
      var btn = document.getElementById('reg-submit');
      var msg = document.getElementById('reg-message');

      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        msg.className = 'form-message';
        msg.textContent = '';

        var data = {
          name:       document.getElementById('reg-name').value.trim(),
          mobile:     document.getElementById('reg-mobile').value.trim(),
          email:      document.getElementById('reg-email').value.trim(),
          course:     document.getElementById('reg-course').value,
          experience: document.getElementById('reg-experience').value,
          source:     document.getElementById('reg-source').value,
          remarks:    document.getElementById('reg-remarks').value.trim()
        };

        if (!data.name || !data.mobile || !data.email || !data.course) {
          msg.className = 'form-message error';
          msg.textContent = 'Please fill all required fields (*).';
          return;
        }

        if (!WEB3FORMS_ACCESS_KEY || WEB3FORMS_ACCESS_KEY === 'REPLACE_WITH_YOUR_WEB3FORMS_KEY') {
          msg.className = 'form-message error';
          msg.textContent = '⚠️ Form not yet activated. Admin: please add your Web3Forms access key in register.html (line ~138).';
          return;
        }

        btn.disabled = true;
        var oldText = btn.textContent;
        btn.textContent = 'Submitting...';

        try {
          var payload = {
            access_key: WEB3FORMS_ACCESS_KEY,
            subject: 'New Registration: ' + data.name + ' (' + data.course + ')',
            from_name: 'TestNova Website',
            replyto: data.email,
            // Form fields — they appear in the email body in the order listed
            Name: data.name,
            Mobile: data.mobile,
            Email: data.email,
            Course: data.course,
            Experience: data.experience || '-',
            Source: data.source || '-',
            Remarks: data.remarks || '-',
            // Admin tracking columns (filled later when the team reviews)
            Called: 'No',
            Interested: 'TBD',
            'Follow-up Date': 'TBD',
            Joined: 'No'
          };
          var res = await fetch('https://api.web3forms.com/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify(payload)
          });
          var body = await res.json().catch(function () { return {}; });
          if (!res.ok || !body.success) throw new Error(body.message || 'Submission failed');
          msg.className = 'form-message success';
          msg.textContent = '✅ Registration received! Our team will contact you soon.';
          form.reset();
        } catch (err) {
          msg.className = 'form-message error';
          msg.textContent = '❌ ' + (err.message || 'Something went wrong. Please try again.');
        } finally {
          btn.disabled = false;
          btn.textContent = oldText;
        }
      });
    })();
  </script>
</body>
</html>
